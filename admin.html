<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্মার্ট খামার - এডমিন প্যানেল</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Noto Sans Bengali', sans-serif; background-color: #f4f7f6; }
        
        /* Scrolling Text Animation */
        .scrolling-wrapper { overflow: hidden; white-space: nowrap; border-radius: 0.75rem; }
        .scrolling-wrapper span { display: inline-block; padding-left: 100%; animation: scroll-left 15s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
        
        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 pb-20">

    <!-- 🔐 Password Gate Modal -->
    <div id="admin-password-gate" class="fixed inset-0 bg-gray-950/95 z-[999] flex flex-col items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl p-6 shadow-2xl border border-gray-100 text-center space-y-4 w-full max-w-sm">
            <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto">
                <span class="material-symbols-outlined text-3xl text-red-500">lock</span>
            </div>
            <div>
                <h2 class="text-lg font-bold text-gray-800">এডমিন অ্যাক্সেস লকড</h2>
                <p class="text-xs text-gray-500 mt-1">এই পেজে প্রবেশ করতে সিকিউরিটি পাসওয়ার্ড প্রয়োজন</p>
            </div>
            <div class="space-y-3">
                <input type="password" id="admin-gate-pass" placeholder="পাসওয়ার্ড লিখুন" class="w-full p-3 text-center border border-gray-200 rounded-xl font-bold tracking-wider text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <button onclick="checkAdminGatePassword()" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-xl transition duration-200 shadow-md">প্রবেশ করুন</button>
            </div>
            <p id="gate-error-msg" class="text-red-500 font-bold text-xs hidden">❌ ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।</p>
        </div>
    </div>

    <header class="bg-gradient-to-r from-teal-800 to-teal-600 text-white p-6 shadow-lg rounded-b-3xl mb-6 sticky top-0 z-20">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span class="material-symbols-outlined text-3xl">admin_panel_settings</span> 
                এডমিন প্যানেল
            </h1>
            <span class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold backdrop-blur-sm shadow-sm">আমার খামার</span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 space-y-6">
        
        <!-- 💊 Vaccine & Medicine Guideline Manager -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 transition hover:shadow-md space-y-4">
            <div class="flex justify-between items-center border-b pb-3 border-gray-100">
                <h2 class="text-lg font-bold text-teal-700 flex items-center gap-2">
                    <span class="material-symbols-outlined">vaccines</span> ঔষধ ও ভ্যাকসিন গাইডলাইন
                </h2>
                <button onclick="openScheduleForm()" class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1 active:scale-95 shadow-sm">
                    <span class="material-symbols-outlined text-sm">add</span> নতুন অ্যাড করুন
                </button>
            </div>

            <!-- Schedule Form (hidden by default) -->
            <div id="scheduleFormContainer" class="hidden bg-gray-50 p-4 rounded-2xl border border-gray-200/60 space-y-3 relative">
                <h3 id="formTitle" class="font-bold text-sm text-gray-700">নতুন গাইডলাইন যোগ করুন</h3>
                <button onclick="closeScheduleForm()" class="absolute top-3 right-3 text-gray-400 hover:text-red-500 transition">
                    <span class="material-symbols-outlined text-lg">close</span>
                </button>
                <form id="scheduleForm" onsubmit="saveSchedule(event)" class="space-y-3">
                    <input type="hidden" id="scheduleId">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 block mb-1">ঔষধ/ভ্যাকসিনের নাম</label>
                            <input type="text" id="schedName" required placeholder="যেমন: BCRD" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-1 focus:ring-teal-500">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 block mb-1">টার্গেট দিন (মুরগির বয়স)</label>
                            <input type="number" id="schedDay" required placeholder="যেমন: ৭" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-1 focus:ring-teal-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 block mb-1">ধরণ / ক্যাটাগরি</label>
                            <select id="schedCategory" required class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-1 focus:ring-teal-500">
                                <option value="Vaccine">ভ্যাকসিন (Vaccine)</option>
                                <option value="Antibiotic">অ্যান্টিবায়োটিক</option>
                                <option value="Vitamin">ভিটামিন ও জিংক</option>
                                <option value="Saline">স্যালাইন ও গ্লুকোজ</option>
                                <option value="Calcium">ক্যালসিয়াম</option>
                                <option value="Deworming">কৃমিনাশক</option>
                                <option value="Others">অন্যান্য</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 block mb-1">মাত্রা ও পরিমাণ</label>
                            <input type="text" id="schedDose" required placeholder="যেমন: ১ ফোঁটা চোখে" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-1 focus:ring-teal-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 block mb-1">মুরগির জাত (Breed)</label>
                            <select id="schedBreed" required class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-1 focus:ring-teal-500">
                                <option value="Broiler">ব্রয়লার (Broiler)</option>
                                <option value="ColorBird">কালার বার্ড / কক (Color Bird)</option>
                                <option value="Sonali">সোনালি (Sonali)</option>
                                <option value="Deshi">দেশি (Deshi)</option>
                                <option value="All">সব জাতের জন্য (All)</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 block mb-1">প্রয়োগের সময় (Time)</label>
                            <select id="schedTime" required class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-1 focus:ring-teal-500">
                                <option value="সকাল">সকাল (Morning)</option>
                                <option value="দুপুর">দুপুর (Noon)</option>
                                <option value="রাত">রাত (Night)</option>
                                <option value="সারাদিন">সারাদিন (All Day)</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 block mb-1">বিবরণ / গাইডলাইন</label>
                        <textarea id="schedDesc" required placeholder="প্রয়োগের পদ্ধতি ও গুরুত্ব লিখুন..." rows="2" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-1 focus:ring-teal-500"></textarea>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" class="flex-grow bg-teal-600 hover:bg-teal-700 text-white p-3 rounded-xl text-xs font-bold transition shadow-sm">সংরক্ষণ করুন</button>
                        <button type="button" id="btnDeleteSched" onclick="deleteSchedule()" class="hidden bg-red-50 hover:bg-red-100 text-red-600 px-4 rounded-xl text-xs font-bold transition">মুছে ফেলুন</button>
                    </div>
                </form>
            </div>

            <!-- List of current guidelines -->
            <div id="scheduleList" class="space-y-3 max-h-96 overflow-y-auto no-scrollbar">
                <p class="text-center text-gray-400 text-xs py-10">লোড হচ্ছে...</p>
            </div>
        </div>

    </main>

    <!-- Reusable Beautiful Confirmation Modal -->
    <div id="customConfirmModal" class="hidden fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm animate-[fadeIn_0.15s_ease-out]">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-gray-100 transform transition scale-100 duration-150">
            <div class="flex items-center gap-3 text-amber-600 mb-3" id="confirmIconContainer">
                <span class="material-symbols-outlined text-3xl font-extrabold" id="confirmIcon">help</span>
                <h3 class="text-base font-extrabold text-gray-800" id="confirmTitle">নিশ্চিতকরণ</h3>
            </div>
            <p class="text-xs font-semibold text-gray-500 mb-6 leading-relaxed" id="confirmMessage">আপনি কি এই কাজটি করতে চান?</p>
            <div class="flex gap-3 justify-end">
                <button onclick="closeCustomConfirm()" class="px-4 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl text-xs font-bold transition">বাতিল</button>
                <button id="confirmYesBtn" class="px-5 py-2.5 bg-teal-600 hover:bg-teal-700 text-white rounded-xl text-xs font-bold transition shadow-md active:scale-95">হ্যাঁ, নিশ্চিত করুন</button>
            </div>
        </div>
    </div>

    <script>
        // --- Password Gate Verification ---
        function checkAdminGatePassword() {
            const pass = document.getElementById("admin-gate-pass").value;
            if (pass === "dev@shuvo") {
                document.getElementById("admin-password-gate").classList.add("hidden");
                localStorage.setItem("admin_authenticated_shuvo", "true");
            } else {
                const errorMsg = document.getElementById("gate-error-msg");
                errorMsg.classList.remove("hidden");
                document.getElementById("admin-gate-pass").value = "";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("admin_authenticated_shuvo") === "true") {
                document.getElementById("admin-password-gate").classList.add("hidden");
            }
        });

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyBD3Ev8Gg2yValARgfxeRlSwDWrdERmtKE",
            authDomain: "mypoltyfarm.firebaseapp.com",
            databaseURL: "https://mypoltyfarm-default-rtdb.firebaseio.com",
            projectId: "mypoltyfarm",
            storageBucket: "mypoltyfarm.firebasestorage.app",
            messagingSenderId: "620769276564",
            appId: "1:620769276564:web:939c4e1065d8dfb9d6fa81"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. Medicine & Vaccine Guideline Manager ---
        const scheduleRef = db.ref("medicine_schedule");
        let allSchedules = {};

        // Default list to seed if empty
        const defaultSchedules = [
            { day: 1, name: "চিনির পানি", category: "Saline", dose: "যত টুকু খেতে পারে", desc: "বি:দ্র: প্রথম ২ ঘণ্টা চিনির পানি খাওয়াতে হবে 😊 তারপরে সারাদিন সাদা পানি খাওয়াতে হবে 😊✅", breed: "Broiler", time: "সকাল" },
            { day: 1, name: "২ ঘণ্টা পরে সারাদিন সাদা পানি", category: "Saline", dose: "যত টুকু খেতে পারে তত টুকু", desc: "প্রথম ২ ঘণ্টা চিনির পানি খাওয়া শেষে বাকি সারা দিন ফ্রেশ সাদা পানি সরবরাহ করুন।", breed: "Broiler", time: "সারাদিন" },
            { day: 2, name: "এনফ্লোক্স ভেট", category: "Antibiotic", dose: "১ মিলি ২ লিটার পানিতে", desc: "মুরগির প্রথম অবস্থায় ব্যাকটেরিয়াজনিত আক্রমণ রোধ করতে সাহায্য করে।", breed: "Broiler", time: "সকাল" },
            { day: 3, name: "ভিটামিন ও অ্যামিনো অ্যাসিড", category: "Vitamin", dose: "১ মিলি প্রতি ২ লিটার পানিতে", desc: "৩য় থেকে ৫ম দিন পর্যন্ত মুরগির দৈহিক বৃদ্ধির জন্য ও রোগ প্রতিরোধ ক্ষমতা গড়ে তুলতে পানির সাথে মিশিয়ে দিন।", breed: "Broiler", time: "সকাল" },
            { day: 5, name: "বিসিআরডিভি টিকা (BCRDV - ১ম ডোজ)", category: "Vaccine", dose: "১ ফোঁটা চোখে", desc: "রাণীকক্ষেত রোগ প্রতিরোধে ৩ থেকে ৫ দিনের মাথায় প্রথম চোখের ফোঁটা দিতে হবে।", breed: "Broiler", time: "সকাল" },
            { day: 12, name: "গাম্বোরো টিকা (Gumboro - ১ম ডোজ)", category: "Vaccine", dose: "১ ফোঁটা চোখে বা পানিতে", desc: "গাম্বোরো রোগ প্রতিরোধে ১০ থেকে ১২তম দিনে প্রথম ডোজ দিতে হবে।", breed: "Broiler", time: "সকাল" },
            { day: 28, name: "কৃমিনাশক ঔষধ (Deworming)", category: "Deworming", dose: "১ গ্রাম প্রতি লিটার", desc: "২৮তম দিনে কৃমি দূর করতে পানিতে মিশিয়ে বা পোল্ট্রি ভেটেরিনারি পরামর্শ অনুযায়ী দিন।", breed: "Broiler", time: "সকাল" }
        ];

        // Categories Map for UI
        const medCategories = {
            'Vaccine': { icon: '💉', label: 'ভ্যাকসিন', color: 'text-blue-600 bg-blue-50' },
            'Antibiotic': { icon: '💊', label: 'অ্যান্টিবায়োটিক', color: 'text-red-600 bg-red-50' },
            'Vitamin': { icon: '🍏', label: 'ভিটামিন', color: 'text-purple-600 bg-purple-50' },
            'Saline': { icon: '🥤', label: 'স্যালাইন', color: 'text-teal-600 bg-teal-50' },
            'Calcium': { icon: '🦴', label: 'ক্যালসিয়াম', color: 'text-orange-600 bg-orange-50' },
            'Deworming': { icon: '🐛', label: 'কৃমিনাশক', color: 'text-amber-600 bg-amber-50' },
            'Others': { icon: '📦', label: 'অন্যান্য', color: 'text-gray-600 bg-gray-50' }
        };

        const breedLabels = {
            'Broiler': 'ব্রয়লার',
            'ColorBird': 'কালার বার্ড',
            'Sonali': 'সোনালি',
            'Deshi': 'দেশি',
            'All': 'সব জাত'
        };

        // Fetch Guideline Schedules from Admin Database
        scheduleRef.on("value", snapshot => {
            const data = snapshot.val();
            allSchedules = data || {};
            const listContainer = document.getElementById("scheduleList");
            listContainer.innerHTML = "";

            if (!data) {
                // If completely empty, auto-seed with standard schedules
                listContainer.innerHTML = `
                    <div class="text-center py-6">
                        <p class="text-sm text-gray-500 mb-3">ডাটাবেজে কোনো গাইডলাইন পাওয়া যায়নি।</p>
                        <button onclick="autoSeedSchedules()" class="bg-teal-600 text-white px-4 py-2 rounded-xl text-xs font-bold transition shadow active:scale-95">
                            ডিফল্ট গাইডলাইন সেট করুন
                        </button>
                    </div>`;
                return;
            }

            // Sort schedules by target day
            const sorted = Object.entries(data).sort((a, b) => a[1].day - b[1].day);

            sorted.forEach(([id, item]) => {
                const cat = medCategories[item.category] || medCategories['Others'];
                const breedText = breedLabels[item.breed || 'Broiler'] || 'ব্রয়লার';
                const timeText = item.time || 'সকাল';
                
                const html = `
                    <div onclick="editSchedule('${id}')" class="bg-gray-50 hover:bg-gray-100/80 border border-gray-100 p-4 rounded-2xl flex items-center justify-between cursor-pointer transition">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl ${cat.color} flex items-center justify-center text-xl font-bold">
                                ${cat.icon}
                            </div>
                            <div>
                                <h4 class="font-bold text-xs text-gray-800 flex items-center gap-2">
                                    ${item.name} 
                                    <span class="bg-teal-700 text-white text-[9px] font-extrabold px-2 py-0.5 rounded-full">${item.day}ম দিন</span>
                                    <span class="bg-amber-700 text-white text-[9px] font-extrabold px-2 py-0.5 rounded-full">${breedText}</span>
                                    <span class="bg-blue-700 text-white text-[9px] font-extrabold px-2 py-0.5 rounded-full">${timeText}</span>
                                </h4>
                                <p class="text-[10px] text-gray-400 mt-0.5 truncate max-w-[200px] sm:max-w-md">${item.desc}</p>
                            </div>
                        </div>
                        <div class="text-right flex flex-col justify-center items-end">
                            <span class="text-[10px] font-bold text-gray-500 block">${item.dose}</span>
                            <span class="text-[8px] text-gray-400">${cat.label}</span>
                        </div>
                    </div>`;
                listContainer.innerHTML += html;
            });
        });

        // Custom confirm logic
        let confirmCallback = null;
        function showCustomConfirm(title, message, isDangerous, onConfirm) {
            document.getElementById("confirmTitle").innerText = title;
            document.getElementById("confirmMessage").innerText = message;
            
            const icon = document.getElementById("confirmIcon");
            const iconContainer = document.getElementById("confirmIconContainer");
            const yesBtn = document.getElementById("confirmYesBtn");
            
            if (isDangerous) {
                icon.innerText = "warning";
                iconContainer.className = "flex items-center gap-3 text-red-600 mb-3";
                yesBtn.className = "px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl text-xs font-bold transition shadow-md active:scale-95";
            } else {
                icon.innerText = "help";
                iconContainer.className = "flex items-center gap-3 text-teal-600 mb-3";
                yesBtn.className = "px-5 py-2.5 bg-teal-600 hover:bg-teal-700 text-white rounded-xl text-xs font-bold transition shadow-md active:scale-95";
            }
            
            confirmCallback = onConfirm;
            document.getElementById("customConfirmModal").classList.remove("hidden");
        }
        
        function closeCustomConfirm() {
            document.getElementById("customConfirmModal").classList.add("hidden");
            confirmCallback = null;
        }
        
        document.getElementById("confirmYesBtn").addEventListener("click", () => {
            if (confirmCallback) confirmCallback();
            closeCustomConfirm();
        });

        // Seed Default Guidelines
        async function autoSeedSchedules() {
            showCustomConfirm(
                "ডিফল্ট গাইডলাইন সেট করুন", 
                "আপনি কি ডিফল্ট পোল্ট্রি ভ্যাকসিন ও ঔষধের গাইডলাইনগুলো ডাটাবেজে সেট করতে চান?", 
                false, 
                async () => {
                    for (const item of defaultSchedules) {
                        await scheduleRef.push(item);
                    }
                    alert("✅ ডিফল্ট গাইডলাইনগুলো সফলভাবে সেভ হয়েছে!");
                }
            );
        }

        // Form Helpers
        function openScheduleForm() {
            document.getElementById("scheduleForm").reset();
            document.getElementById("scheduleId").value = "";
            document.getElementById("formTitle").innerText = "নতুন গাইডলাইন যোগ করুন";
            document.getElementById("btnDeleteSched").classList.add("hidden");
            document.getElementById("scheduleFormContainer").classList.remove("hidden");
        }

        // Edit Mode
        function editSchedule(id) {
            const item = allSchedules[id];
            if (!item) return;

            document.getElementById("scheduleId").value = id;
            document.getElementById("schedName").value = item.name || '';
            document.getElementById("schedDay").value = item.day || '';
            document.getElementById("schedCategory").value = item.category || 'Vaccine';
            document.getElementById("schedDose").value = item.dose || '';
            document.getElementById("schedDesc").value = item.desc || '';
            document.getElementById("schedBreed").value = item.breed || 'Broiler';
            document.getElementById("schedTime").value = item.time || 'সকাল';

            document.getElementById("formTitle").innerText = "গাইডলাইন এডিট করুন";
            document.getElementById("btnDeleteSched").classList.remove("hidden");
            document.getElementById("scheduleFormContainer").classList.remove("hidden");
        }

        // Save (Create or Update)
        async function saveSchedule(e) {
            e.preventDefault();
            const id = document.getElementById("scheduleId").value;
            const data = {
                name: document.getElementById("schedName").value.trim(),
                day: parseInt(document.getElementById("schedDay").value),
                category: document.getElementById("schedCategory").value,
                dose: document.getElementById("schedDose").value.trim(),
                desc: document.getElementById("schedDesc").value.trim(),
                breed: document.getElementById("schedBreed").value,
                time: document.getElementById("schedTime").value
            };

            if (id) {
                await scheduleRef.child(id).update(data);
                alert("✅ গাইডলাইনটি সফলভাবে আপডেট হয়েছে!");
            } else {
                await scheduleRef.push(data);
                alert("✅ নতুন গাইডলাইনটি সফলভাবে যোগ হয়েছে!");
            }
            document.getElementById("scheduleFormContainer").classList.add("hidden");
        }

        // Delete
        async function deleteSchedule() {
            const id = document.getElementById("scheduleId").value;
            if (id) {
                showCustomConfirm(
                    "গাইডলাইন ডিলিট নিশ্চিতকরণ", 
                    "আপনি কি নিশ্চিত এই গাইডলাইনটি ডিলিট করতে চান? এটি আর ফিরে পাওয়া যাবে না।", 
                    true, 
                    async () => {
                        await scheduleRef.child(id).remove();
                        alert("🗑️ গাইডলাইনটি মুছে ফেলা হয়েছে!");
                        document.getElementById("scheduleFormContainer").classList.add("hidden");
                    }
                );
            }
        }
    </script>
</body>
</html>
